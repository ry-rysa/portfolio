<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>rysa portfolio</title>
<style>body { opacity: 0; }</style>
<script>
	(function(){
		const t = localStorage.getItem('theme');
		if (t === 'dark') document.documentElement.setAttribute('data-theme','dark');
	})();
</script>
<script>
	if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
	history.replaceState(null, '', window.location.pathname);
	window.scrollTo(0, 0);
	window.addEventListener('load', () => {
		window.scrollTo(0, 0);
		document.body.style.transition = 'opacity 0.3s ease';
		document.body.style.opacity = '1';
	});
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@700,800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">

<style>
	:root {
		--paper:   #ffffff;
		--ink:     #111111;
		--mute:    #6b7280;
		--faint:   #9ca3af;
		--rule:    #e5e7eb;
		--surface: #f3f4f6;
		--card:    #ffffff;
		--nav-bg:  rgba(255,255,255,0.92);
		--sans:  'Inter', ui-sans-serif, system-ui, sans-serif;
		--serif: 'Instrument Serif', Georgia, serif;
		--mono:  'JetBrains Mono', ui-monospace, monospace;
	}
	[data-theme="dark"] {
		--paper:   #0f0f10;
		--ink:     #f2f2f0;
		--mute:    #8e8e93;
		--faint:   #636366;
		--rule:    #2c2c2e;
		--surface: #1c1c1e;
		--card:    #1a1a1c;
		--nav-bg:  rgba(15,15,16,0.92);
	}
	html { transition: background-color .25s; }
	html, body {
		margin: 0; padding: 0; background: var(--paper);
		color: var(--ink); font-family: var(--sans);
		-webkit-font-smoothing: antialiased;
		-moz-osx-font-smoothing: grayscale;
		font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
		letter-spacing: -0.003em;
		scroll-behavior: auto;
		overflow-anchor: none;
		overflow-x: clip;
	}
	*, *::before, *::after { box-sizing: border-box; }
	::selection { background: var(--ink); color: var(--paper); }
	a { color: inherit; }

	body::-webkit-scrollbar { width: 6px; }
	body::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 3px; }

	[data-theme="dark"] .icon-adaptive {
		filter: invert(1) brightness(0.85);
	}
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
